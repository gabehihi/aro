<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @page { size: A4; margin: 2cm; }
  body { font-family: "Noto Sans CJK KR", "맑은 고딕", sans-serif; font-size: 11pt; line-height: 1.6; color: #333; }
  .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
  .header h1 { font-size: 18pt; margin: 0; }
  .header .clinic { font-size: 10pt; color: #666; }
  .patient-info { background: #f5f5f5; padding: 10px; margin-bottom: 15px; border-radius: 4px; }
  .section { margin-bottom: 15px; }
  .section h2 { font-size: 12pt; border-bottom: 1px solid #ddd; padding-bottom: 4px; margin-bottom: 8px; }
  .section p { margin: 4px 0; }
  .placeholder { background: #fff3cd; padding: 4px 8px; border: 1px dashed #ffc107; border-radius: 4px; }
  .footer { margin-top: 30px; border-top: 1px solid #ddd; padding-top: 10px; text-align: right; font-size: 10pt; }
</style>
</head>
<body>
  <div class="header">
    <div class="clinic">보건소</div>
    <h1>{{ title }}</h1>
  </div>
  <div class="patient-info">
    <strong>환자:</strong> {{ patient_name }} | <strong>발급일:</strong> {{ today }}
  </div>
  {% block content %}{% endblock %}
  <div class="footer">
    <p>발급일: {{ today }}</p>
    <p>담당의: _________________ (서명)</p>
  </div>
</body>
</html>
